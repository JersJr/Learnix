<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Learnix - Registro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Registro Learnix</h2>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="register()">Registrarse</button>

  <div class="msg" id="msg"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyC7YnPQGDIL5WZpob4VpPviRlPeddNs5aDaMAz8H38CfEeJFc3TyGZnFijDrsnDo-4Jg/exec"; // ← CAMBIA ESTO

  async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.innerText = "Procesando...";

    try {
      const response = await fetch(
        `${API_URL}?action=register&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
      );

      const data = await response.json();

      if (data.success) {
        msg.style.color = "lightgreen";
        msg.innerText = "Registro exitoso 🎉";
      } else {
        msg.style.color = "red";
        msg.innerText = data.message;
      }

    } catch (error) {
      msg.style.color = "red";
      msg.innerText = "Error de conexión";
      console.error(error);
    }
  }
</script>

</body>
</html>
